name: Spring Boot Docker CI/CD

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Spring Boot jar 빌드
        run: ./gradlew clean bootJar -x test

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/git-turl-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/git-turl-backend:latest

      - name: EC2 서버에서 .env 생성 + 최신 이미지 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cat > ~/app/.env <<EOF
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            cd ~/app
            if docker compose version > /dev/null 2>&1; then
              docker compose --env-file .env pull
              docker compose --env-file .env down
              docker compose --env-file .env up -d
            else
              docker-compose --env-file .env pull
              docker-compose --env-file .env down
              docker-compose --env-file .env up -d
            fi

            docker image prune -f