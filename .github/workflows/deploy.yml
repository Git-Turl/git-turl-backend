name: Spring Boot Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Spring Boot jar 빌드
        run: ./gradlew clean bootJar -x test

      - name: 빌드 결과 확인
        run: |
          ls -al build/libs
          unzip -p build/libs/app.jar META-INF/MANIFEST.MF || true

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 Push
        run: |
          docker build --no-cache -t ${{ secrets.DOCKERHUB_USERNAME }}/git-turl-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/git-turl-backend:latest

      - name: Docker 이미지 내부 JAR 확인
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/git-turl-backend:latest sh -c "unzip -p /app/app.jar META-INF/MANIFEST.MF || true"

      - name: docker-compose.yml 파일 EC2로 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/app"

      - name: EC2 서버에서 .env 생성 + 최신 이미지 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cat > /home/ubuntu/app/.env <<EOF
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            OAUTH_GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
            OAUTH_GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
            EOF

            cd /home/ubuntu/app

            echo "===== .env 확인 ====="
            cat .env | sed 's/=.*/=***HIDDEN***/' || true

            echo "===== docker-compose.yml 확인 ====="
            cat docker-compose.yml || true

            docker compose --env-file .env pull
            docker compose --env-file .env down
            docker compose --env-file .env up -d

            echo "===== 컨테이너 상태 ====="
            docker ps -a

            echo "===== 앱 로그 ====="
            docker compose --env-file .env logs --tail=100

            docker image prune -f