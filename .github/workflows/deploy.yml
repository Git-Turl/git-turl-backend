name: Spring Boot Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Spring Boot jar 빌드
        run: ./gradlew clean bootJar -x test

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 Push
        run: |
          docker build --no-cache -t ${{ secrets.DOCKERHUB_USERNAME }}/git-turl-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/git-turl-backend:latest

      - name: EC2에 docker-compose.yml 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/app"

      - name: EC2 서버에 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app

            cat > /home/ubuntu/app/.env <<EOF
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            OAUTH_GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
            OAUTH_GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            CLOUD_ACCESS_KEY=${{ secrets.CLOUD_ACCESS_KEY }}
            CLOUD_SECRET_KEY=${{ secrets.CLOUD_SECRET_KEY }}
            EOF

            cd /home/ubuntu/app
            
            echo "===== docker-compose.yml ====="
            cat docker-compose.yml
            
            echo "===== env created ====="
            
            docker-compose down
            docker-compose pull
            docker-compose up -d
            
            docker-compose logs --tail=100